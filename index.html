<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>BOM — Óculos Inteligentes v9.4.4.2</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8f7f4;--surface:#ffffff;--border:#e2e0d8;--border2:#c8c5bb;--text:#1a1916;--muted:#6b6860;--accent:#1d4ed8;--green:#15803d;--amber:#b45309;--red:#b91c1c;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif}
@media(prefers-color-scheme:dark){:root{--bg:#0f0f0d;--surface:#1a1916;--border:#2a2824;--border2:#3a3830;--text:#e8e6e0;--muted:#8a8880;--accent:#60a5fa;--green:#4ade80;--amber:#fbbf24;--red:#f87171}}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.5;padding:24px 28px}
h1{font-size:18px;font-weight:500;margin-bottom:4px}
.sub{font-size:12px;color:var(--muted);margin-bottom:20px}
/* controls */
.controls{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.controls input{background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:6px 12px;font-family:var(--sans);font-size:12px;color:var(--text);width:220px;outline:none}
.controls input:focus{border-color:var(--accent)}
.controls select{background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;font-family:var(--sans);font-size:12px;color:var(--text);outline:none;cursor:pointer}
/* totals */
.totals{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.tbox{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 16px;min-width:120px}
.tbox .n{font-size:20px;font-weight:500;font-family:var(--mono);color:var(--accent)}
.tbox .l{font-size:11px;color:var(--muted);margin-top:2px}
/* table */
.wrap{overflow-x:auto;border:1px solid var(--border);border-radius:10px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--surface);padding:9px 12px;text-align:left;font-weight:500;font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border2);white-space:nowrap}
thead th.num{text-align:right}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface)}
td{padding:8px 12px;vertical-align:top}
td.cat{font-size:10px;white-space:nowrap}
td.part{font-family:var(--mono);font-size:11px;font-weight:500}
td.maker{font-size:11px;color:var(--muted)}
td.desc{font-size:11px;color:var(--muted);max-width:300px}
td.ref{font-family:var(--mono);font-size:10px;color:var(--muted)}
td.qty{text-align:right;font-family:var(--mono);font-size:12px;font-weight:500}
td.price{text-align:right;font-family:var(--mono);font-size:11px}
td.total{text-align:right;font-family:var(--mono);font-size:11px;font-weight:500}
td.src{font-size:10px;color:var(--accent)}
.badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:4px;font-weight:500;white-space:nowrap}
.b-mcu{background:#dbeafe;color:#1e40af}.b-cam{background:#fce7f3;color:#9d174d}
.b-sen{background:#d1fae5;color:#065f46}.b-imu{background:#ede9fe;color:#5b21b6}
.b-aud{background:#fef3c7;color:#92400e}.b-hap{background:#fee2e2;color:#991b1b}
.b-pwr{background:#e0f2fe;color:#0369a1}.b-pro{background:#f3f4f6;color:#374151}
.b-led{background:#fef9c3;color:#713f12}.b-con{background:#f0fdf4;color:#166534}
.b-fpc{background:#fff7ed;color:#9a3412}.b-fet{background:#f5f3ff;color:#4c1d95}
.b-res{background:#fafaf9;color:#57534e}.b-cap{background:#ecfdf5;color:#064e3b}
.b-ind{background:#fdf2f8;color:#701a75}.b-pcb{background:#eff6ff;color:#1d4ed8}
.b-mec{background:#f7f7f5;color:#292524}
@media(prefers-color-scheme:dark){
.b-mcu{background:#1e3a8a;color:#bfdbfe}.b-cam{background:#831843;color:#fbcfe8}
.b-sen{background:#064e3b;color:#a7f3d0}.b-imu{background:#4c1d95;color:#ddd6fe}
.b-aud{background:#78350f;color:#fde68a}.b-hap{background:#7f1d1d;color:#fca5a5}
.b-pwr{background:#0c4a6e;color:#bae6fd}.b-pro{background:#1f2937;color:#d1d5db}
.b-led{background:#713f12;color:#fef08a}.b-con{background:#14532d;color:#bbf7d0}
.b-fpc{background:#7c2d12;color:#fed7aa}.b-fet{background:#2e1065;color:#ddd6fe}
.b-res{background:#1c1917;color:#d6d3d1}.b-cap{background:#022c22;color:#6ee7b7}
.b-ind{background:#4a044e;color:#f0abfc}.b-pcb{background:#1e3a8a;color:#bfdbfe}
.b-mec{background:#1c1917;color:#d6d3d1}}
.sep{background:var(--bg);border-top:2px solid var(--border2)}
.sep td{padding:4px 12px;font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
tr.hidden{display:none}
</style>
</head>
<body>

<h1>BOM — Óculos Inteligentes v9.4.4.2</h1>
<div class="sub">Lista completa de materiais para 1 par de óculos · v9.4.4.2 com fixes P1–P6 aplicados</div>

<div class="controls">
  <input id="search" type="text" placeholder="Pesquisar componente..." oninput="filter()">
  <select id="catFilter" onchange="filter()">
    <option value="">Todas as categorias</option>
  </select>
  <span style="font-size:11px;color:var(--muted)" id="count-info"></span>
</div>

<div class="totals">
  <div class="tbox"><div class="n" id="t-lines">—</div><div class="l">linhas BOM</div></div>
  <div class="tbox"><div class="n" id="t-parts">—</div><div class="l">peças totais</div></div>
  <div class="tbox"><div class="n" id="t-cost">—</div><div class="l">custo est. / par</div></div>
  <div class="tbox"><div class="n" id="t-pcb">€17.25</div><div class="l">só PCBs (5 placas)</div></div>
</div>

<div class="wrap">
<table id="bom-table">
<thead>
<tr>
  <th>Cat.</th>
  <th>Componente</th>
  <th>Fabricante</th>
  <th>Descrição</th>
  <th>Ref. PCB</th>
  <th class="num">Qtd.</th>
  <th class="num">€/un</th>
  <th class="num">Total</th>
  <th>Fonte</th>
</tr>
</thead>
<tbody id="bom-body"></tbody>
</table>
</div>

  ["RESISTÊNCIA","5.1kΩ 0402","Yageo","USB-C CC1/CC2 ×4",4,"R_CC",0.01,"LCSC: C23186"],
  ["RESISTÊNCIA","470kΩ 0402","Yageo","RC force-off ×2",2,"R5_rc",0.01,"LCSC: C25764"],
  ["RESISTÊNCIA","0Ω 0402","Yageo","R_match antena (jumper) ×2",2,"R_match",0.01,"LCSC"],
  ["CONDENSADOR","10µF 0805 X5R 10V","Murata","Bulk decoupling C_DIG/SEN/ACT/pwr/PICO ×12",12,"C_10u",0.05,"LCSC: C15850"],

  ["PCB","PCB-L haste MASTER","JLCPCB","FR-4 1.6mm 2L ENIG double-sided, 110×12mm tapered",1,"PCB-L",5.00,"jlcpcb.com"],
  ["PCB","PCB-R haste SLAVE","JLCPCB","FR-4 1.6mm 2L ENIG double-sided, 110×12mm tapered",1,"PCB-R",5.00,"jlcpcb.com"],
  ["PCB","PCB-FL câmara esq.","JLCPCB","FR-4 1.0mm 2L ENIG, 38×15mm",1,"PCB-FL",3.00,"jlcpcb.com"],
  ["PCB","PCB-FC câmara central","JLCPCB","FR-4 1.0mm 2L ENIG, 22×13mm",1,"PCB-FC",1.25,"jlcpcb.com"],
  ["PCB","PCB-FR câmara dir.","JLCPCB","FR-4 1.0mm 2L ENIG, 38×15mm",1,"PCB-FR",3.00,"jlcpcb.com"],
  
  ["MECÂNICA","Cabo JST-PH inter-board","Generic","8p macho-macho 100mm",1,"CBL_IB",1.50,"AliExpress"],
];

const CAT_BADGE = {
  "MCU":"b-mcu","CÂMARA":"b-cam","SENSOR":"b-sen","IMU":"b-imu",
  "ÁUDIO":"b-aud","HAPTIC":"b-hap","POWER":"b-pwr","PROTECÇÃO":"b-pro",
  "LED":"b-led","CONECTOR":"b-con","FPC CABO":"b-fpc","FET":"b-fet",
  "RESISTÊNCIA":"b-res","CONDENSADOR":"b-cap","INDUTOR":"b-ind",
  "PCB":"b-pcb","MECÂNICA":"b-mec",
};

let visible = [...BOM];

function render(){
  const tbody = document.getElementById('bom-body');
  let html='', lastCat='', lines=0, parts=0, cost=0;
  visible.forEach(r=>{
    const [cat,name,maker,desc,qty,ref,price,src]=r;
    if(cat!==lastCat){
      html+=`<tr class="sep"><td colspan="9">${cat}</td></tr>`;
      lastCat=cat;
    }
    const tot=(qty*price).toFixed(2);
    const badge=CAT_BADGE[cat]||'b-res';
    html+=`<tr>
      <td class="cat"><span class="badge ${badge}">${cat}</span></td>
      <td class="part">${name}</td>
      <td class="maker">${maker}</td>
      <td class="desc">${desc}</td>
      <td class="ref">${ref}</td>
      <td class="qty">${qty}</td>
      <td class="price">€${price.toFixed(2)}</td>
      <td class="total">€${tot}</td>
      <td class="src">${src}</td>
    </tr>`;
    lines++; parts+=qty; cost+=qty*price;
  });
  tbody.innerHTML=html;
  document.getElementById('t-lines').textContent=lines;
  document.getElementById('t-parts').textContent=parts;
  document.getElementById('t-cost').textContent='€'+cost.toFixed(2);
  document.getElementById('count-info').textContent=`${lines} de ${BOM.length} linhas`;
}

function filter(){
  const q=document.getElementById('search').value.toLowerCase();
  const cat=document.getElementById('catFilter').value;
  visible=BOM.filter(r=>{
    const match=!q||(r[0]+r[1]+r[2]+r[3]+r[5]).toLowerCase().includes(q);
    const catMatch=!cat||r[0]===cat;
    return match&&catMatch;
  });
  render();
}

// Populate categories
(()=>{
  const cats=[...new Set(BOM.map(r=>r[0]))];
  const sel=document.getElementById('catFilter');
  cats.forEach(c=>{
    const o=document.createElement('option');
    o.value=c; o.textContent=c;
    sel.appendChild(o);
  });
})();

render();
</script>
</body>
</html>
